<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSUK AI Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">
    <header class="header">
        <div class="logo-container">
            <img src="nsuk-logo.png" alt="NSUK Logo" class="university-logo">
        </div>
        <h2>NSUK AI Assistant</h2>
        <p>Your official guide to NSUK Admissions</p>
    </header>

    <div class="suggestions">
        <button onclick="quickAsk('What is NSUK cut off mark?')">Cut off mark</button>
        <button onclick="quickAsk('How to apply for NSUK admission?')">Admission</button>
        <button onclick="quickAsk('Where is NSUK located?')">Location</button>
    </div>

    <div id="chat-box" class="chat-box">
        <div class="message bot">Welcome to NSUK! How can I help you today?</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask your question..." onkeydown="if(event.key==='Enter') sendMessage()" />
        <button onclick="sendMessage()">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</div>

<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
